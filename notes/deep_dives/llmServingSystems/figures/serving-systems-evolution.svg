<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/></marker>
    <style>
      .title{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .label{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
      .math{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#213547}
      .box{fill:#f8fbfc;stroke:#9ab7c4;stroke-width:2;rx:8}
      .one{fill:#eef6ff;stroke:#4d91c9;stroke-width:2;rx:8}
      .two{fill:#edf8f1;stroke:#55a66f;stroke-width:2;rx:8}
      .three{fill:#fff4e8;stroke:#d58b33;stroke-width:2;rx:8}
      .arrow{stroke:#2f4858;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1040" height="520" fill="#fff"/>
  <text x="40" y="45" class="title">三篇论文的系统演进：调度 -> KV 内存 -> 程序级复用</text>
  <rect x="70" y="120" width="250" height="230" class="one"/>
  <text x="105" y="160" class="label">Orca</text>
  <text x="105" y="200" class="math">iteration-level scheduling</text>
  <text x="105" y="235" class="math">selective batching</text>
  <text x="105" y="290" class="small">解决请求动态加入/退出和不同生成长度。</text>
  <path d="M330 235 H405" class="arrow"/>
  <rect x="420" y="120" width="250" height="230" class="two"/>
  <text x="455" y="160" class="label">PagedAttention / vLLM</text>
  <text x="455" y="200" class="math">paged KV cache</text>
  <text x="455" y="235" class="math">block table + COW</text>
  <text x="455" y="290" class="small">解决 batch 扩大后的 KV cache 碎片和共享。</text>
  <path d="M680 235 H755" class="arrow"/>
  <rect x="770" y="120" width="250" height="230" class="three"/>
  <text x="805" y="160" class="label">SGLang</text>
  <text x="805" y="200" class="math">RadixAttention</text>
  <text x="805" y="235" class="math">structured execution</text>
  <text x="805" y="290" class="small">解决多调用程序的前缀复用和结构化输出。</text>
  <text x="95" y="430" class="small">共同主线：LLM serving 的瓶颈从单次算子性能，转向请求调度、KV cache 生命周期、跨调用复用和程序结构。</text>
</svg>
