<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/></marker>
    <style>
      .title{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .label{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
      .math{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#213547}
      .box{fill:#f8fbfc;stroke:#9ab7c4;stroke-width:2;rx:8}
      .node{fill:#edf8f1;stroke:#55a66f;stroke-width:2;rx:20}
      .new{fill:#fff4e8;stroke:#d58b33;stroke-width:2;rx:20}
      .use{fill:#eef6ff;stroke:#4d91c9;stroke-width:2;rx:20}
      .edge{stroke:#2f4858;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .line{stroke:#7f8b91;stroke-width:2;fill:none}
    </style>
  </defs>
  <rect width="1040" height="560" fill="#fff"/>
  <text x="40" y="45" class="title">SGLang RadixAttention：把跨调用共享前缀变成可复用 KV cache</text>
  <rect x="55" y="85" width="410" height="410" class="box"/>
  <text x="85" y="125" class="label">LM program 产生的共享前缀</text>
  <text x="85" y="170" class="math">system prompt + examples</text>
  <text x="85" y="215" class="math">├─ question A -> answer</text>
  <text x="85" y="255" class="math">├─ question B -> answer</text>
  <text x="85" y="295" class="math">└─ fork / self-consistency</text>
  <text x="85" y="380" class="small">多轮聊天、few-shot、agent 分支都制造长共享前缀。</text>
  <path d="M475 270 H545" class="edge"/>
  <rect x="560" y="85" width="405" height="410" class="box"/>
  <text x="590" y="125" class="label">Radix tree + LRU cache</text>
  <circle cx="650" cy="190" r="28" class="node"/><text x="640" y="196" class="math">root</text>
  <circle cx="735" cy="260" r="35" class="use"/><text x="705" y="266" class="math">shared prefix</text>
  <circle cx="660" cy="360" r="30" class="new"/><text x="645" y="366" class="math">A</text>
  <circle cx="810" cy="360" r="30" class="new"/><text x="795" y="366" class="math">B</text>
  <path d="M670 206 C690 225 710 240 728 250" class="line"/>
  <path d="M725 290 C700 320 680 340 670 352" class="line"/>
  <path d="M750 290 C775 320 795 340 805 352" class="line"/>
  <text x="590" y="440" class="small">prefix match 命中后直接复用 KV；新 suffix 插入树；内存紧张时按 LRU 叶子驱逐。</text>
</svg>
