<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/></marker>
    <style>
      .title{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .label{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
      .math{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#213547}
      .box{fill:#f8fbfc;stroke:#9ab7c4;stroke-width:2;rx:8}
      .page{fill:#edf8f1;stroke:#55a66f;stroke-width:2;rx:6}
      .virt{fill:#eef6ff;stroke:#4d91c9;stroke-width:2;rx:6}
      .share{fill:#fff4e8;stroke:#d58b33;stroke-width:2;rx:6}
      .arrow{stroke:#2f4858;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1040" height="560" fill="#fff"/>
  <text x="40" y="45" class="title">PagedAttention：逻辑 token block 通过 block table 映射到物理 KV block</text>
  <rect x="65" y="95" width="260" height="390" class="box"/>
  <text x="95" y="130" class="label">Sequence A logical blocks</text>
  <rect x="95" y="170" width="90" height="45" class="virt"/><text x="123" y="199" class="math">A0</text>
  <rect x="95" y="230" width="90" height="45" class="virt"/><text x="123" y="259" class="math">A1</text>
  <rect x="95" y="290" width="90" height="45" class="virt"/><text x="123" y="319" class="math">A2</text>
  <text x="95" y="390" class="small">按需 append；最后一个 block 可能未满</text>
  <rect x="390" y="95" width="230" height="390" class="box"/>
  <text x="430" y="130" class="label">Block table</text>
  <text x="430" y="190" class="math">A0 -> P7</text>
  <text x="430" y="250" class="math">A1 -> P2</text>
  <text x="430" y="310" class="math">A2 -> P9</text>
  <text x="430" y="390" class="small">类似页表；物理地址可不连续</text>
  <rect x="690" y="95" width="260" height="390" class="box"/>
  <text x="725" y="130" class="label">Physical KV blocks</text>
  <rect x="725" y="165" width="80" height="45" class="page"/><text x="750" y="194" class="math">P2</text>
  <rect x="820" y="165" width="80" height="45" class="page"/><text x="845" y="194" class="math">P7</text>
  <rect x="725" y="225" width="80" height="45" class="share"/><text x="750" y="254" class="math">P9</text>
  <rect x="820" y="225" width="80" height="45" class="page"/><text x="845" y="254" class="math">P4</text>
  <rect x="725" y="285" width="80" height="45" class="page"/><text x="750" y="314" class="math">P1</text>
  <rect x="820" y="285" width="80" height="45" class="share"/><text x="845" y="314" class="math">P5</text>
  <text x="720" y="390" class="small">固定大小 block 消除外部碎片；支持共享和 COW。</text>
  <path d="M190 192 H385" class="arrow"/><path d="M520 190 H815" class="arrow"/>
  <path d="M190 252 H385" class="arrow"/><path d="M520 250 H720" class="arrow"/>
  <path d="M190 312 H385" class="arrow"/><path d="M520 310 H720" class="arrow"/>
</svg>
