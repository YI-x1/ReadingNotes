<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-label="Online normalizer update">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #233142; stroke-width: 2; rx: 8; }
      .title { font: 700 25px Arial, sans-serif; fill: #233142; }
      .head { font: 700 18px Arial, sans-serif; fill: #233142; }
      .txt { font: 15px Arial, sans-serif; fill: #334155; }
      .math { font: 17px Georgia, serif; fill: #111827; }
      .accent { fill: #2a9d8f; }
      .warn { fill: #e76f51; }
      .gold { fill: #e9c46a; }
      .arrow { stroke: #233142; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#233142"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="470"/>
  <text x="40" y="45" class="title">Online normalizer: when max changes, rescale the old sum</text>

  <rect x="45" y="82" width="280" height="145" class="box"/>
  <text x="68" y="117" class="head">已有前 j-1 个元素</text>
  <text x="68" y="150" class="math">m₍ⱼ₋₁₎ = max(x₁...xⱼ₋₁)</text>
  <text x="68" y="184" class="math">d₍ⱼ₋₁₎ = Σ exp(xᵢ - m₍ⱼ₋₁₎)</text>

  <path d="M335 155 H420" class="arrow"/>
  <rect x="430" y="82" width="190" height="145" class="box"/>
  <text x="455" y="117" class="head">读入新元素</text>
  <circle cx="525" cy="166" r="42" class="gold"/>
  <text x="506" y="174" class="math">xⱼ</text>

  <path d="M630 155 H715" class="arrow"/>
  <rect x="725" y="82" width="210" height="145" class="box"/>
  <text x="748" y="117" class="head">更新基准最大值</text>
  <text x="748" y="162" class="math">mⱼ = max(mⱼ₋₁, xⱼ)</text>

  <rect x="88" y="280" width="805" height="130" class="box"/>
  <text x="115" y="318" class="head">关键变换</text>
  <text x="115" y="356" class="math">dⱼ = dⱼ₋₁ · exp(mⱼ₋₁ - mⱼ) + exp(xⱼ - mⱼ)</text>
  <text x="115" y="388" class="txt">旧的 normalizer 原本以 mⱼ₋₁ 为基准；如果新最大值变成 mⱼ，就把旧和缩放到新的基准后再加入新项。</text>

  <path d="M830 228 V270" class="arrow"/>
  <path d="M185 228 V270" class="arrow"/>
  <path d="M525 228 V270" class="arrow"/>
</svg>
