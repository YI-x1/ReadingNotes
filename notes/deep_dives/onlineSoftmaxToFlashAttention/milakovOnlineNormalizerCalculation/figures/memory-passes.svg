<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Softmax memory passes comparison">
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .panel { fill: #ffffff; stroke: #293241; stroke-width: 2; rx: 8; }
      .title { font: 700 24px Arial, sans-serif; fill: #293241; }
      .label { font: 700 17px Arial, sans-serif; fill: #293241; }
      .small { font: 14px Arial, sans-serif; fill: #3d405b; }
      .muted { font: 13px Arial, sans-serif; fill: #6b7280; }
      .load { fill: #2a9d8f; }
      .compute { fill: #e9c46a; }
      .store { fill: #e76f51; }
      .arrow { stroke: #293241; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#293241"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="420"/>
  <text x="40" y="45" class="title">Safe Softmax vs. Online Softmax: memory passes</text>

  <rect x="40" y="78" width="900" height="135" class="panel"/>
  <text x="68" y="112" class="label">Safe Softmax</text>
  <text x="68" y="137" class="small">先求全局最大值 m，再求归一化项 d，最后写出 y</text>
  <rect x="70" y="160" width="145" height="30" class="load"/>
  <text x="86" y="181" class="small">load x: max</text>
  <path d="M225 175 H295" class="arrow"/>
  <rect x="305" y="160" width="170" height="30" class="load"/>
  <text x="322" y="181" class="small">load x: sum exp</text>
  <path d="M485 175 H555" class="arrow"/>
  <rect x="565" y="160" width="145" height="30" class="load"/>
  <text x="583" y="181" class="small">load x: output</text>
  <path d="M720 175 H790" class="arrow"/>
  <rect x="800" y="160" width="95" height="30" class="store"/>
  <text x="818" y="181" class="small">store y</text>
  <text x="715" y="112" class="label">4 accesses / element</text>

  <rect x="40" y="245" width="900" height="135" class="panel"/>
  <text x="68" y="279" class="label">Online Softmax</text>
  <text x="68" y="304" class="small">一遍同时维护 running max 和 normalizer，再一遍写出 y</text>
  <rect x="70" y="327" width="225" height="30" class="load"/>
  <text x="88" y="348" class="small">load x: update m and d</text>
  <path d="M305 342 H500" class="arrow"/>
  <rect x="510" y="327" width="145" height="30" class="load"/>
  <text x="528" y="348" class="small">load x: output</text>
  <path d="M665 342 H790" class="arrow"/>
  <rect x="800" y="327" width="95" height="30" class="store"/>
  <text x="818" y="348" class="small">store y</text>
  <text x="715" y="279" class="label">3 accesses / element</text>

  <rect x="72" y="392" width="18" height="14" class="load"/><text x="98" y="404" class="muted">load</text>
  <rect x="158" y="392" width="18" height="14" class="compute"/><text x="184" y="404" class="muted">compute</text>
  <rect x="270" y="392" width="18" height="14" class="store"/><text x="296" y="404" class="muted">store</text>
</svg>
