<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">Block online softmax update</title>
  <desc id="desc">A diagram of the block-wise online softmax and output update formula used in FlashAttention.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
    <style>
      .title{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .label{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
      .math{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#213547}
      .old{fill:#eef6ff;stroke:#4d91c9;stroke-width:2;rx:8}
      .new{fill:#fff4e8;stroke:#d58b33;stroke-width:2;rx:8}
      .out{fill:#edf8f1;stroke:#55a66f;stroke-width:2;rx:8}
      .box{fill:#f8fbfc;stroke:#9ab7c4;stroke-width:2;rx:8}
      .arrow{stroke:#2f4858;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1040" height="540" fill="#fff"/>
  <text x="40" y="45" class="title">Block-wise online softmax：每行维护 m、l、O</text>
  <rect x="55" y="85" width="240" height="105" class="old"/>
  <text x="86" y="123" class="math">旧状态</text>
  <text x="83" y="152" class="math">mᵢ, lᵢ, Oᵢ</text>
  <path d="M302 137 H380" class="arrow"/>
  <rect x="390" y="85" width="280" height="105" class="new"/>
  <text x="425" y="120" class="math">当前 tile Sᵢⱼ</text>
  <text x="420" y="150" class="math">m̃ᵢⱼ=rowmax(Sᵢⱼ)</text>
  <text x="420" y="174" class="math">l̃ᵢⱼ=rowsum(exp(Sᵢⱼ-m̃ᵢⱼ))</text>
  <path d="M678 137 H756" class="arrow"/>
  <rect x="765" y="85" width="215" height="105" class="out"/>
  <text x="805" y="123" class="math">新状态</text>
  <text x="805" y="152" class="math">mnew,lnew,Onew</text>

  <rect x="70" y="240" width="900" height="230" class="box"/>
  <text x="105" y="282" class="math">mnew = max(mᵢ, m̃ᵢⱼ)</text>
  <text x="105" y="322" class="math">lnew = exp(mᵢ-mnew) · lᵢ + exp(m̃ᵢⱼ-mnew) · l̃ᵢⱼ</text>
  <text x="105" y="362" class="math">P̃ᵢⱼ = exp(Sᵢⱼ - m̃ᵢⱼ)</text>
  <text x="105" y="402" class="math">Onew = [ exp(mᵢ-mnew) · lᵢ · Oᵢ + exp(m̃ᵢⱼ-mnew) · P̃ᵢⱼVⱼ ] / lnew</text>
  <text x="105" y="448" class="small">直觉：旧 O 和当前 tile 的 P̃V 都先换到同一个新最大值基准，再按新的总分母归一化。</text>
</svg>
