<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580" role="img" aria-labelledby="title desc">
  <title id="title">FlashAttention tiling memory flow</title>
  <desc id="desc">A diagram showing tiles of K and V streamed through SRAM while output state is updated.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
    <style>
      .label{font:600 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
      .math{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#213547}
      .hbm{fill:#f7f7f5;stroke:#8a8f93;stroke-width:2;rx:8}
      .sram{fill:#edf8f1;stroke:#55a66f;stroke-width:2;rx:8}
      .tile{fill:#fff4e8;stroke:#d58b33;stroke-width:2;rx:4}
      .q{fill:#eef6ff;stroke:#4d91c9;stroke-width:2;rx:4}
      .arrow{stroke:#2f4858;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#9aa3a8;stroke-width:2;stroke-dasharray:7 6;fill:none}
    </style>
  </defs>
  <rect x="0" y="0" width="980" height="580" fill="#ffffff"/>
  <text x="40" y="45" class="label">分块后的内存流：L 很大，片上只放一个小窗口</text>

  <rect x="55" y="85" width="340" height="410" class="hbm"/>
  <text x="75" y="120" class="label">HBM / 全局内存</text>
  <rect x="85" y="150" width="95" height="270" class="q"/>
  <text x="118" y="290" class="math">Q</text>
  <rect x="210" y="150" width="95" height="270" class="tile"/>
  <text x="243" y="290" class="math">Kᵀ</text>
  <line x1="210" y1="210" x2="305" y2="210" class="dash"/>
  <line x1="210" y1="270" x2="305" y2="270" class="dash"/>
  <line x1="210" y1="330" x2="305" y2="330" class="dash"/>
  <rect x="330" y="150" width="45" height="270" class="tile"/>
  <text x="345" y="290" class="math">V</text>
  <line x1="330" y1="210" x2="375" y2="210" class="dash"/>
  <line x1="330" y1="270" x2="375" y2="270" class="dash"/>
  <line x1="330" y1="330" x2="375" y2="330" class="dash"/>

  <path d="M400 245 H495" class="arrow"/>
  <rect x="505" y="105" width="390" height="330" class="sram"/>
  <text x="525" y="140" class="label">SRAM / shared memory</text>
  <rect x="535" y="175" width="105" height="70" class="q"/>
  <text x="558" y="217" class="math">Q block</text>
  <rect x="670" y="175" width="105" height="70" class="tile"/>
  <text x="692" y="217" class="math">K tile</text>
  <rect x="805" y="175" width="65" height="70" class="tile"/>
  <text x="823" y="217" class="math">V</text>
  <path d="M620 265 H800" class="arrow"/>
  <rect x="535" y="300" width="335" height="90" class="hbm"/>
  <text x="565" y="335" class="math">状态：m, d, O block</text>
  <text x="565" y="365" class="small">随 tile 流式更新，不保存完整 A</text>

  <path d="M700 438 V500 H210" class="arrow"/>
  <rect x="130" y="512" width="250" height="38" class="hbm"/>
  <text x="150" y="536" class="small">只把最终 O 写回 HBM</text>
</svg>
