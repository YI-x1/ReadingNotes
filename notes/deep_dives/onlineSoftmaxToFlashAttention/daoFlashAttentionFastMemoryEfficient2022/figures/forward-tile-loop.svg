<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="590" viewBox="0 0 1040 590" role="img" aria-labelledby="title desc">
  <title id="title">FlashAttention forward tile loop</title>
  <desc id="desc">A diagram of the FlashAttention forward nested loop over KV and Q blocks.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
    <style>
      .title{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .label{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
      .math{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#213547}
      .hbm{fill:#f7f7f5;stroke:#8a8f93;stroke-width:2;rx:8}
      .sram{fill:#edf8f1;stroke:#55a66f;stroke-width:2;rx:8}
      .tile{fill:#fff4e8;stroke:#d58b33;stroke-width:2;rx:6}
      .state{fill:#eef6ff;stroke:#4d91c9;stroke-width:2;rx:6}
      .arrow{stroke:#2f4858;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#a0a8ad;stroke-width:2;stroke-dasharray:7 6;fill:none}
    </style>
  </defs>
  <rect width="1040" height="590" fill="#fff"/>
  <text x="40" y="45" class="title">Forward：外层扫 K/V block，内层扫 Q/O block</text>

  <rect x="60" y="90" width="210" height="380" class="hbm"/>
  <text x="95" y="125" class="label">HBM 矩阵</text>
  <rect x="92" y="155" width="55" height="260" class="state"/>
  <text x="111" y="292" class="math">Q</text>
  <rect x="165" y="155" width="42" height="260" class="tile"/>
  <text x="178" y="292" class="math">K</text>
  <rect x="220" y="155" width="42" height="260" class="tile"/>
  <text x="233" y="292" class="math">V</text>
  <line x1="165" y1="230" x2="207" y2="230" class="dash"/>
  <line x1="220" y1="230" x2="262" y2="230" class="dash"/>
  <line x1="165" y1="305" x2="207" y2="305" class="dash"/>
  <line x1="220" y1="305" x2="262" y2="305" class="dash"/>

  <path d="M278 230 H365" class="arrow"/>
  <rect x="375" y="90" width="565" height="410" class="sram"/>
  <text x="405" y="125" class="label">片上 SRAM / registers</text>

  <rect x="410" y="155" width="140" height="70" class="tile"/>
  <text x="447" y="184" class="math">load Kⱼ,Vⱼ</text>
  <text x="438" y="207" class="small">外层固定</text>
  <path d="M557 190 H625" class="arrow"/>
  <rect x="635" y="155" width="135" height="70" class="state"/>
  <text x="671" y="184" class="math">load Qᵢ</text>
  <text x="657" y="207" class="small">读 Oᵢ,lᵢ,mᵢ</text>
  <path d="M704 230 V270" class="arrow"/>
  <rect x="560" y="280" width="265" height="82" class="tile"/>
  <text x="600" y="311" class="math">Sᵢⱼ = Qᵢ Kⱼᵀ</text>
  <text x="595" y="337" class="small">MMA/Tensor Core 计算</text>
  <path d="M692 365 V402" class="arrow"/>
  <rect x="510" y="410" width="380" height="65" class="state"/>
  <text x="540" y="436" class="math">mnew,lnew,Onew = online_update(...)</text>
  <text x="560" y="459" class="small">写回当前 Q block 对应的 Oᵢ,lᵢ,mᵢ</text>

  <path d="M635 470 C500 530,400 505,410 230" class="dash"/>
  <text x="430" y="538" class="small">对同一个 K/V block，遍历所有 Q block；再换下一个 K/V block。</text>
</svg>
