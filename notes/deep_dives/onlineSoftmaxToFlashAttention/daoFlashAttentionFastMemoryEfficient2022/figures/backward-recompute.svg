<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">FlashAttention backward recomputation</title>
  <desc id="desc">A diagram showing recomputation of attention blocks during backward pass.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
    <style>
      .title{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .label{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2d3d}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
      .math{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#213547}
      .hbm{fill:#f7f7f5;stroke:#8a8f93;stroke-width:2;rx:8}
      .sram{fill:#edf8f1;stroke:#55a66f;stroke-width:2;rx:8}
      .tile{fill:#fff4e8;stroke:#d58b33;stroke-width:2;rx:6}
      .grad{fill:#eef6ff;stroke:#4d91c9;stroke-width:2;rx:6}
      .arrow{stroke:#2f4858;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1040" height="540" fill="#fff"/>
  <text x="40" y="45" class="title">Backward：不保存 P，按 tile 重算 P 并累积梯度</text>
  <rect x="60" y="90" width="260" height="355" class="hbm"/>
  <text x="92" y="125" class="label">Forward 保存到 HBM</text>
  <text x="92" y="170" class="math">Q,K,V</text>
  <text x="92" y="205" class="math">O, dO</text>
  <text x="92" y="240" class="math">m,l 或 LSE</text>
  <text x="92" y="275" class="math">Philox RNG state</text>
  <text x="92" y="330" class="small">没有 N×N 的 P</text>
  <path d="M328 250 H410" class="arrow"/>
  <rect x="420" y="90" width="460" height="355" class="sram"/>
  <text x="455" y="125" class="label">每个 backward tile</text>
  <rect x="455" y="155" width="180" height="60" class="tile"/>
  <text x="485" y="190" class="math">Sᵢⱼ=τQᵢKⱼᵀ</text>
  <path d="M642 185 H710" class="arrow"/>
  <rect x="720" y="155" width="140" height="60" class="tile"/>
  <text x="750" y="190" class="math">Pᵢⱼ</text>
  <text x="738" y="209" class="small">用 m,l 重建</text>
  <rect x="455" y="255" width="185" height="70" class="grad"/>
  <text x="490" y="285" class="math">dV += PᵀdO</text>
  <text x="490" y="308" class="math">dP = dOVᵀ</text>
  <path d="M648 290 H710" class="arrow"/>
  <rect x="720" y="255" width="140" height="70" class="grad"/>
  <text x="747" y="285" class="math">dS=P(dP-D)</text>
  <text x="747" y="308" class="math">D=rowsum(dO·O)</text>
  <path d="M790 330 V365" class="arrow"/>
  <rect x="560" y="370" width="250" height="55" class="grad"/>
  <text x="595" y="404" class="math">dQ += dSK, dK += dSᵀQ</text>
  <path d="M885 395 H975" class="arrow"/>
  <rect x="982" y="348" width="30" height="92" class="hbm"/>
</svg>
